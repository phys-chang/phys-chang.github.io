<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Open quantum system placeholder</title>
  <desc id="desc">A minimal pale-blue schematic placeholder for open-system and many-body dynamics.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#f8fcff"/><stop offset="1" stop-color="#eaf6ff"/></linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0l10 5-10 5z" fill="#76b7df" opacity=".75"/></marker>
  </defs>
  <rect width="960" height="360" fill="url(#bg)"/>
  <path d="M80 92h800M80 180h800M80 268h800" stroke="#cfe5f4" stroke-width="1" opacity=".72"/>
  <g fill="none" stroke="#76b7df" stroke-width="2.4" opacity=".78">
    <circle cx="250" cy="180" r="58"/>
    <circle cx="480" cy="180" r="58"/>
    <circle cx="710" cy="180" r="58"/>
    <path d="M308 180h114" marker-end="url(#arrow)"/>
    <path d="M538 180h114" marker-end="url(#arrow)"/>
    <path d="M480 122c20-48 74-68 118-44" marker-end="url(#arrow)"/>
    <path d="M480 238c-20 48-74 68-118 44" marker-end="url(#arrow)"/>
  </g>
  <g fill="#2f75a2" font-family="Avenir, Helvetica, Arial, sans-serif" font-size="18" opacity=".8">
    <text x="250" y="187" text-anchor="middle">ρ(t)</text>
    <text x="480" y="187" text-anchor="middle">L</text>
    <text x="710" y="187" text-anchor="middle">scaling</text>
  </g>
  <text x="480" y="322" text-anchor="middle" fill="#5f8298" font-family="Avenir, Helvetica, Arial, sans-serif" font-size="16" letter-spacing="2">OPEN SYSTEM / MANY-BODY DYNAMICS PLACEHOLDER</text>
</svg>
